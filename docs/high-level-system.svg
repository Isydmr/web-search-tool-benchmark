  <rect x="500" y="220" width="500" height="92" rx="20" fill="url(#titleGradient)" filter="url(#shadow)"/>
  <rect x="360" y="395" width="170" height="94" rx="20" fill="#FFFFFF" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="395" width="180" height="94" rx="20" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="770" y="383" width="190" height="118" rx="20" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="990" y="395" width="150" height="94" rx="20" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2" filter="url(#shadow)"/>
