  <rect x="1230" y="395" width="300" height="94" rx="20" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1230" y="540" width="300" height="100" rx="20" fill="#FFFFFF" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1230" y="665" width="140" height="84" rx="20" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1390" y="665" width="140" height="84" rx="20" fill="url(#pagesGradient)" filter="url(#shadow)"/>

  <text x="180" y="278" text-anchor="middle" class="card-title">News Sources</text>
  <text x="180" y="305" text-anchor="middle" class="card-body">Reuters, AP, BBC, NPR, ...</text>

  <text x="180" y="425" text-anchor="middle" class="card-title">Daily Scheduler</text>
  <text x="180" y="452" text-anchor="middle" class="card-body">daily benchmark runs</text>

  <text x="180" y="545" text-anchor="middle" class="card-title">Manual Run</text>
  <text x="180" y="572" text-anchor="middle" class="card-body">CLI and scripts</text>

  <text x="750" y="258" text-anchor="middle" class="dark-title">Benchmark Orchestrator</text>
  <text x="750" y="284" text-anchor="middle" class="dark-body">runs fetch -&gt; perturb -&gt; evaluate</text>

  <text x="445" y="430" text-anchor="middle" class="card-title">News Fetcher</text>
  <text x="445" y="457" text-anchor="middle" class="card-body">fetch + dedupe</text>

  <text x="650" y="430" text-anchor="middle" class="card-title">Variant Generator</text>
  <text x="650" y="457" text-anchor="middle" class="card-body">inject one false claim</text>

  <text x="865" y="429" text-anchor="middle" class="card-title">Search Models</text>
  <text x="865" y="456" text-anchor="middle" class="card-body">search, verify, repair</text>

  <text x="1065" y="430" text-anchor="middle" class="card-title">Scoring</text>
  <text x="1065" y="457" text-anchor="middle" class="card-body">repair score + diagnostics</text>

  <text x="865" y="580" text-anchor="middle" class="card-title">Model Pool</text>
  <text x="865" y="607" text-anchor="middle" class="card-body">OpenAI, Perplexity</text>
  <text x="865" y="627" text-anchor="middle" class="card-body">Anthropic, Gemini</text>

  <text x="1380" y="430" text-anchor="middle" class="card-title">Benchmark DB</text>
  <text x="1380" y="457" text-anchor="middle" class="card-body">SQLite: articles, outputs, scores</text>

  <text x="1380" y="577" text-anchor="middle" class="card-title">Public Export</text>
  <text x="1380" y="604" text-anchor="middle" class="card-body">snapshot + viewer build</text>

  <text x="1300" y="700" text-anchor="middle" class="card-title">Viewer Bundle</text>
  <text x="1300" y="727" text-anchor="middle" class="card-body">viewer/ + data/latest/</text>

  <text x="1460" y="700" text-anchor="middle" class="dark-title">GitHub Pages</text>
  <text x="1460" y="727" text-anchor="middle" class="pages-body">live demo</text>

