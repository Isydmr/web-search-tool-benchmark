<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGradient" x1="360" y1="24" x2="1240" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="pagesGradient" x1="1390" y1="665" x2="1530" y2="749" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9A3412"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#EA580C"/>
    </marker>
    <style>
      .title {
        font-family: Helvetica;
        font-size: 34px;
        font-weight: 700;
        fill: #FFFFFF;
      }
      .subtitle {
        font-family: Helvetica;
        font-size: 14px;
        font-weight: 500;
        fill: #CBD5E1;
      }
      .pill {
        font-family: Helvetica;
        font-size: 14px;
        font-weight: 700;
        fill: #FFFFFF;
      }
      .card-title {
        font-family: Helvetica;
        font-size: 19px;
        font-weight: 700;
        fill: #0F172A;
      }
      .card-body {
        font-family: Helvetica;
        font-size: 13px;
        font-weight: 500;
        fill: #475569;
      }
      .dark-title {
        font-family: Helvetica;
        font-size: 19px;
        font-weight: 700;
        fill: #FFFFFF;
      }
      .dark-body {
        font-family: Helvetica;
        font-size: 13px;
        font-weight: 500;
        fill: #CBD5E1;
      }
      .pages-body {
        font-family: Helvetica;
        font-size: 13px;
        font-weight: 500;
        fill: #FED7AA;
      }
