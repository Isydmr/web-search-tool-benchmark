  <rect x="1220" y="165" width="200" height="32" rx="16" fill="#9A3412"/>

  <text x="145" y="185" text-anchor="middle" class="pill">Inputs &amp; Control</text>
  <text x="460" y="185" text-anchor="middle" class="pill">Benchmark Core</text>
  <text x="1320" y="185" text-anchor="middle" class="pill">Storage &amp; Delivery</text>

