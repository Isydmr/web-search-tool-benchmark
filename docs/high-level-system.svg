  <rect x="460" y="535" width="220" height="92" rx="20" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="645" width="220" height="92" rx="20" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2" filter="url(#shadow)"/>
  <rect x="730" y="530" width="240" height="110" rx="20" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>

  <rect x="1070" y="255" width="205" height="95" rx="20" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1325" y="255" width="195" height="95" rx="20" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1070" y="430" width="450" height="110" rx="20" fill="#FFFFFF" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1070" y="615" width="205" height="100" rx="20" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1315" y="615" width="205" height="100" rx="20" fill="url(#pagesGradient)" filter="url(#shadow)"/>

  <text x="190" y="274" text-anchor="middle" class="card-title">Trusted News Sources</text>
  <text x="190" y="301" text-anchor="middle" class="card-body">Reuters, AP, NPR, BBC,</text>
  <text x="190" y="321" text-anchor="middle" class="card-body">Guardian, Al Jazeera</text>

  <text x="190" y="420" text-anchor="middle" class="card-title">Daily Scheduler</text>
  <text x="190" y="447" text-anchor="middle" class="card-body">scheduled benchmark runs</text>

  <text x="190" y="554" text-anchor="middle" class="card-title">Manual Run Scripts</text>
  <text x="190" y="581" text-anchor="middle" class="card-body">run_end_to_end.sh</text>
  <text x="190" y="601" text-anchor="middle" class="card-body">run_benchmark_once.py</text>

  <text x="690" y="261" text-anchor="middle" class="dark-title">Benchmark Orchestrator</text>
  <text x="690" y="286" text-anchor="middle" class="dark-body">coordinates the end-to-end run</text>

  <text x="570" y="350" text-anchor="middle" class="card-title">News Fetcher</text>
  <text x="570" y="377" text-anchor="middle" class="card-body">pulls and deduplicates live stories</text>

  <text x="570" y="460" text-anchor="middle" class="card-title">Fake-Variant Generator</text>
  <text x="570" y="487" text-anchor="middle" class="card-body">injects subtle entity, date,</text>
  <text x="570" y="507" text-anchor="middle" class="card-body">or location changes</text>

  <text x="570" y="570" text-anchor="middle" class="card-title">Search-Grounded Models</text>
  <text x="570" y="597" text-anchor="middle" class="card-body">verify and repair the manipulated article</text>

  <text x="570" y="680" text-anchor="middle" class="card-title">Scoring &amp; Evaluation</text>
  <text x="570" y="707" text-anchor="middle" class="card-body">surface alignment, repair, and diagnostics</text>

  <text x="850" y="570" text-anchor="middle" class="card-title">Web Search Model Pool</text>
  <text x="850" y="597" text-anchor="middle" class="card-body">OpenAI, Perplexity,</text>
  <text x="850" y="617" text-anchor="middle" class="card-body">Anthropic, Gemini</text>

  <text x="1172.5" y="290" text-anchor="middle" class="card-title">SQLite Benchmark DB</text>
  <text x="1172.5" y="317" text-anchor="middle" class="card-body">articles, modified variants,</text>
  <text x="1172.5" y="337" text-anchor="middle" class="card-body">responses, scores</text>

  <text x="1422.5" y="290" text-anchor="middle" class="card-title">Run Artifacts</text>
  <text x="1422.5" y="317" text-anchor="middle" class="card-body">runs/</text>
  <text x="1422.5" y="337" text-anchor="middle" class="card-body">benchmark.db + manifest</text>

  <text x="1295" y="470" text-anchor="middle" class="card-title">Public Export &amp; Site Build</text>
  <text x="1295" y="497" text-anchor="middle" class="card-body">publish_latest_to_viewer.py + build_pages_site.py</text>

  <text x="1172.5" y="650" text-anchor="middle" class="card-title">Viewer Bundle</text>
  <text x="1172.5" y="677" text-anchor="middle" class="card-body">viewer/ + data/latest/</text>
  <text x="1172.5" y="697" text-anchor="middle" class="card-body">public-safe snapshot</text>

  <text x="1417.5" y="650" text-anchor="middle" class="dark-title">GitHub Pages Viewer</text>
  <text x="1417.5" y="677" text-anchor="middle" class="pages-body">static public benchmark explorer</text>

