  <rect width="1600" height="840" fill="#FFFFFF"/>

  <rect x="350" y="24" width="900" height="74" rx="24" fill="url(#titleGradient)" filter="url(#shadow)"/>
  <text x="800" y="58" text-anchor="middle" class="title">Fake News Benchmark</text>
  <text x="800" y="79" text-anchor="middle" class="subtitle">High-level system from acquisition to public viewer</text>

  <rect x="40" y="140" width="300" height="660" rx="28" fill="#F8FBFF" stroke="#D4E6F8" stroke-width="2"/>
  <rect x="370" y="140" width="640" height="660" rx="28" fill="#F0FDFA" stroke="#A7F3D0" stroke-width="2"/>
  <rect x="1040" y="140" width="520" height="660" rx="28" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>

  <rect x="60" y="165" width="165" height="32" rx="16" fill="#0F172A"/>
  <rect x="390" y="165" width="180" height="32" rx="16" fill="#0F766E"/>
  <rect x="1060" y="165" width="190" height="32" rx="16" fill="#9A3412"/>

  <text x="142.5" y="185" text-anchor="middle" class="pill">Inputs &amp; Control</text>
  <text x="480" y="185" text-anchor="middle" class="pill">Benchmark Core</text>
  <text x="1155" y="185" text-anchor="middle" class="pill">Storage &amp; Delivery</text>

  <rect x="70" y="235" width="240" height="110" rx="20" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="385" width="240" height="92" rx="20" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2" filter="url(#shadow)"/>
