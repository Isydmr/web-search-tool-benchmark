  <rect width="1600" height="820" fill="#FFFFFF"/>

  <rect x="360" y="24" width="880" height="74" rx="24" fill="url(#titleGradient)" filter="url(#shadow)"/>
  <text x="800" y="58" text-anchor="middle" class="title">Fake News Benchmark</text>
  <text x="800" y="79" text-anchor="middle" class="subtitle">Fetch, perturb, evaluate, publish</text>

  <rect x="40" y="140" width="260" height="620" rx="28" fill="#F8FBFF" stroke="#D4E6F8" stroke-width="2"/>
  <rect x="330" y="140" width="840" height="620" rx="28" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2"/>
  <rect x="1200" y="140" width="360" height="620" rx="28" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>

  <rect x="60" y="165" width="170" height="32" rx="16" fill="#0F172A"/>
